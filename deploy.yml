---
- name: Deploy Laravel App to Server
  hosts: all
  tasks:
    - name: Ensure deployment directory exists
      ansible.builtin.file:
        path: "/var/www/html/Kimheng" 
        state: directory
        mode: '0755'

    - name: Copy Laravel files to the server
      ansible.posix.synchronize:
        src: "{{ workspace }}/"
        dest: "/var/www/html/Kimheng/"
        delete: yes
        rsync_opts:
          - "--exclude=.git"
          - "--exclude=database/database.sqlite"  # <-- ADD THIS
          - "--exclude=.env"

    - name: Set permissions for storage and bootstrap/cache
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: '0777'
      loop:
        - "/var/www/html/Kimheng/storage"
        - "/var/www/html/Kimheng/bootstrap/cache"